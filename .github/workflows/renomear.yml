name: Renomear Arquivos via CSV
on: workflow_dispatch

jobs:
  rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dá permissão para o robô salvar as mudanças
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rodar Script de Renomeação
        run: |
          # Garante que o separador seja ponto e vírgula e remove espaços/caracteres de Windows (\r)
          sed -i 's/\r//g' asubstituirgithub.CSV
          
          tail -n +2 asubstituirgithub.CSV | while IFS=';' read -r antigo novo; do
            # Pega só o nome do arquivo final, removendo URLs e espaços
            arq_antigo=$(echo "$antigo" | awk -F'/' '{print $NF}' | xargs)
            arq_novo=$(echo "$novo" | awk -F'/' '{print $NF}' | xargs)
            
            if [ -f "$arq_antigo" ]; then
              git mv "$arq_antigo" "$arq_novo"
              echo "✅ Sucesso: $arq_antigo -> $arq_novo"
            else
              echo "❌ Erro: Arquivo '$arq_antigo' não existe na pasta raiz."
            fi
          done

      - name: Commit e Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          # Só faz commit se houver mudanças reais
          git diff --quiet && git diff --staged --quiet || (git commit -m "Renomeação automática" && git push)
