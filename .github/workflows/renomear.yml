name: Renomear Arquivos via CSV
on: workflow_dispatch

jobs:
  rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rodar Script de Renomeação
        run: |
          echo "--- ESTRUTURA DE PASTAS ATUAL ---"
          ls -R
          echo "--------------------------------"

          # Limpa caracteres invisíveis do Windows no CSV
          sed -i 's/\r//g' asubstituirgithub.CSV
          
          # Lê o CSV pulando o cabeçalho
          tail -n +2 asubstituirgithub.CSV | while IFS=';' read -r antigo novo; do
            # Extrai apenas o nome do arquivo (ex: martec.png) caso venha uma URL
            arq_antigo=$(echo "$antigo" | awk -F'/' '{print $NF}' | xargs)
            arq_novo=$(echo "$novo" | awk -F'/' '{print $NF}' | xargs)
            
            # Procura o arquivo em qualquer lugar do repositório
            caminho_real=$(find . -name "$arq_antigo" -type f | head -n 1)
            
            if [ -z "$arq_antigo" ] || [ -z "$arq_novo" ]; then
                continue
            fi

            if [ -n "$caminho_real" ]; then
              # Extrai a pasta onde o arquivo está para renomear no mesmo lugar
              pasta_origem=$(dirname "$caminho_real")
              git mv "$caminho_real" "$pasta_origem/$arq_novo"
              echo "✅ Sucesso: $arq_antigo -> $arq_novo (em $pasta_origem)"
            else
              echo "❌ Erro: Arquivo '$arq_antigo' não encontrado em nenhuma pasta."
            fi
          done

      - name: Commit e Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          # Só faz o commit se houver mudanças para evitar erro de 'nothing to commit'
          if ! git diff --cached --quiet; then
            git commit -m "Renomeação automática de imagens via CSV"
            git push
          else
            echo "Nenhuma alteração detectada para commit."
          fi
