name: Renomear Arquivos via CSV
on: workflow_dispatch

jobs:
  rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rodar Script de Renomeação
        run: |
          # Limpa caracteres invisíveis do Windows
          sed -i 's/\r//g' asubstituirgithub.CSV
          
          # Lógica Invertida: O script vai buscar o NOME e renomear para o NÚMERO
          tail -n +2 asubstituirgithub.CSV | while IFS=';' read -r numero link_nome; do
            
            # Extrai o nome do arquivo (ex: martec.png) de dentro do link
            nome_original=$(echo "$link_nome" | awk -F'/' '{print $NF}' | xargs)
            nome_final=$(echo "$numero" | awk -F'/' '{print $NF}' | xargs)
            
            if [ -z "$nome_original" ] || [ -z "$nome_final" ]; then
                continue
            fi

            # Procura o arquivo (ex: martec.png)
            caminho_real=$(find . -name "$nome_original" -type f | head -n 1)
            
            if [ -n "$caminho_real" ]; then
              git mv "$caminho_real" "$(dirname "$caminho_real")/$nome_final"
              echo "✅ Sucesso: $nome_original -> $nome_final"
            else
              echo "❌ Erro: Não achei '$nome_original' para virar '$nome_final'"
            fi
          done

      - name: Commit e Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Renomeando nomes para numeros"
            git push
          else
            echo "Nenhuma mudança para salvar."
          fi
